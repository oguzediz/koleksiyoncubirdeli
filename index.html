<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koleksiyoncubirdeli - V7.6 CMS</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === KENDİ FONTUNU KULLANMAK İÇİN === */
        @font-face {
            font-family: 'OzelFont';
            src: url('./fonts/DJB%20Chalk%20It%20Up.ttf') format('truetype');
        }

        :root {
            --bg-color: #0f0f0f; --sidebar-bg: #161616; --text-main: #efefef; --text-muted: #a0a0a0;
            --border-color: #2a2a2a; --hover-bg: #222222; --accent-color: #2ea043;
            --modal-bg: #1c1c1c; --input-bg: #0a0a0a; --danger-color: #cf6679;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, input, button, textarea, select { 
            font-family: 'OzelFont', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }

        body { display: flex; height: 100vh; overflow: hidden; background-color: var(--bg-color); color: var(--text-main); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- SİNEMATİK YÜKLEME EKRANI --- */
        .global-loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .global-loader.show { display: flex; }
        .spinner { width: 60px; height: 60px; border: 4px solid var(--border-color); border-top-color: var(--accent-color); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { font-size: 18px; font-weight: bold; color: white; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* --- SOL MENÜ --- */
        .sidebar { width: 300px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 10; transition: margin-left 0.3s; }
        .sidebar.hidden { margin-left: -300px; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid var(--border-color); display: flex; gap: 15px; align-items: center; }
        #brandLogoContainer { flex: 1; cursor: pointer; display: flex; justify-content: flex-start; align-items: center; min-height: 40px; }
        #logoPlaceholder { border: 2px dashed var(--border-color); border-radius: 8px; width: 100%; text-align: center; color: var(--text-muted); font-size: 12px; font-weight: bold; padding: 10px; transition: 0.2s; }
        #logoPlaceholder:hover { border-color: var(--text-muted); color: white; }
        .menu-toggle-icon { cursor: pointer; color: var(--text-muted); font-size: 18px; transition: 0.2s; }
        .menu-toggle-icon:hover { color: white; }

        .sidebar-content { padding: 20px 15px; flex: 1; overflow-y: auto; }
        .cat-section-header { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 15px; padding-left: 5px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center;}
        .manage-cat-btn { font-size: 16px; color: var(--text-muted); cursor: pointer; background: none; border: none; transition: 0.2s;}
        .manage-cat-btn:hover { color: white; transform: scale(1.2); }

        .cat-wrapper { margin-bottom: 8px; }
        .category-btn { background: var(--hover-bg); border: 1px solid var(--border-color); width: 100%; border-radius: 10px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; position: relative; }
        .category-btn:hover { border-color: var(--text-muted); transform: translateX(3px); }
        .category-btn.active { border-color: var(--accent-color); background: rgba(46, 160, 67, 0.1); }
        .drag-handle { padding: 12px; color: #444; cursor: grab; }
        .cat-name-click { flex: 1; text-align: left; padding: 12px 5px; font-size: 16px; font-weight: 500; display:flex; align-items:center; gap:8px;}
        .cat-icon-img { width: 18px; height: 18px; object-fit: contain; }

        .toggle-sub { padding: 12px; color: var(--text-muted); font-size: 12px; transition: transform 0.3s ease; display:flex; align-items:center; cursor:pointer;}
        .toggle-sub.rotated { transform: rotate(180deg); }

        .sub-category-list { padding-left: 30px; display: none; margin: 5px 0 15px 0; border-left: 1px solid var(--border-color); }
        .sub-category-list.open { display: block; }
        .sub-item-container { margin-bottom: 2px; }
        .sub-btn-wrapper { display: flex; align-items: center; }
        .sub-drag-handle { color: #444; cursor: grab; padding: 8px 10px 8px 0; font-size: 12px; }
        .sub-btn { background: none; border: none; color: var(--text-muted); font-size: 14px; padding: 8px 0; flex: 1; text-align: left; cursor: pointer; transition: 0.2s; display:flex; align-items:center; gap:8px;}
        .sub-btn:hover { color: white; padding-left: 5px; }
        .sub-btn.active { color: var(--accent-color); font-weight: bold; }

        .sub-sub-category-list { padding-left: 20px; display: none; margin-top: 2px; border-left: 1px dashed #333; }
        .sub-sub-category-list.open { display: block; }
        .sub-sub-btn-wrapper { display: flex; align-items: center; margin-bottom: 2px; }
        .sub-sub-btn { background: none; border: none; color: #777; font-size: 13px; padding: 6px 0; flex: 1; text-align: left; cursor: pointer; transition: 0.2s; display:flex; align-items:center; gap:6px;}
        .sub-sub-btn:hover { color: white; padding-left: 5px; }
        .sub-sub-btn.active { color: var(--accent-color); font-weight: bold; }

        /* --- ANA İÇERİK --- */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        .top-bar { height: 75px; display: flex; align-items: center; justify-content: space-between; padding: 0 25px; border-bottom: 1px solid var(--border-color); background: var(--bg-color); }
        .search-area { flex: 1; max-width: 450px; position: relative; margin: 0 20px; }
        .search-area input { width: 100%; padding: 12px 15px 12px 40px; background: var(--sidebar-bg); border: 1px solid var(--border-color); border-radius: 12px; color: white; outline: none; transition: 0.3s; font-size: 16px;}
        .search-area input:focus { border-color: var(--accent-color); background: #000; }
        .search-area i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .view-controls { display: flex; gap: 5px; background: var(--sidebar-bg); padding: 5px; border-radius: 10px; border: 1px solid var(--border-color); }
        .view-btn { background: none; border: none; color: var(--text-muted); width: 35px; height: 35px; border-radius: 7px; cursor: pointer; transition: 0.2s; }
        .view-btn.active { background: var(--accent-color); color: white; }

        /* --- GALERİ MODLARI --- */
        .content-area { flex: 1; padding: 30px; overflow-y: auto; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .list-view { display: flex; flex-direction: column; gap: 15px; max-width: 900px; margin: 0 auto; }
        .list-view .card { flex-direction: row; height: 120px; }
        .list-view .img-container, .list-view .text-cover { width: 100px; height: 120px; border-right: 1px solid var(--border-color); font-size: 24px; }
        .masonry-view { column-count: 4; column-gap: 20px; }
        .masonry-view .card { break-inside: avoid; margin-bottom: 20px; }
        .masonry-view .img-container { height: auto; min-height: 150px; }
        .masonry-view .img-front { position: relative; width: 100%; height: auto; max-height: none; }

        .card { background: var(--sidebar-bg); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; }
        .card:hover { border-color: #555; transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .img-container { position: relative; width: 100%; height: 300px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }
        .img-blur { position: absolute; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(20px); opacity: 0.4; }
        .img-front { position: relative; max-width: 100%; max-height: 100%; object-fit: contain; z-index: 2; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .text-cover { width: 100%; height: 300px; display: flex; align-items: center; justify-content: center; background: linear-gradient(45deg, #1a1a1a, #333); color: var(--text-muted); font-size: 40px; font-weight: 900; }
        .card-info { padding: 15px; flex: 1; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 13px; color: var(--text-muted); display: flex; justify-content: space-between; }

        /* --- MODALLAR --- */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); display: none; z-index: 999; }
        .overlay.show { display: block; }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--modal-bg); border-radius: 20px; border: 1px solid var(--border-color); z-index: 1001; box-shadow: 0 30px 60px rgba(0,0,0,0.8); overflow: hidden; }
        .modal.show { display: block; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color);}
        
        #addModal { width: 950px; height: 680px; padding: 0; }
        #addModal.show { display: flex; flex-direction: row; }
        .modal-sidebar { width: 240px; background: #111; border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; overflow-y: auto;}
        .modal-body { flex: 1; padding: 30px 40px; overflow-y: auto; position: relative; background: var(--modal-bg); }
        
        .tab-btn { padding: 12px; margin-bottom: 8px; border-radius: 12px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 10px; transition: 0.2s; font-weight: 600; font-size: 14px; border: 1px solid transparent;}
        .tab-btn:hover { background: var(--hover-bg); color: white; }
        .tab-btn.active { background: rgba(46, 160, 67, 0.15); color: var(--accent-color); border-color: rgba(46, 160, 67, 0.3); }

        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 10px; color: white; outline: none; font-size: 14px; transition: 0.2s;}
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent-color); }

        .existing-img-preview { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
        .existing-img-preview .img-box { position: relative; width: 60px; height: 60px; }
        .existing-img-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--border-color); }
        .existing-img-preview .img-box.pending img { border: 2px dashed #ffa500; opacity: 0.8;}
        .existing-img-preview .del-icon { position: absolute; top: -5px; right: -5px; background: var(--bg-color); border-radius: 50%; font-size: 14px; cursor: pointer; }

        .module-toolbar { display: none; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px dashed var(--border-color); align-items: center;}
        .mod-title { width: 100%; font-size: 11px; font-weight: 800; color: var(--accent-color); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; display:flex; justify-content:space-between; align-items:center;}
        .mod-btn { background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; display: flex; align-items: center; gap: 5px;}
        .mod-btn:hover { border-color: var(--text-muted); background: var(--hover-bg); }
        .mod-btn.added { opacity: 0.5; cursor: not-allowed; border-color: var(--accent-color); color: var(--accent-color); }

        .cast-builder { background: var(--sidebar-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 15px; }
        .cast-chip { display: inline-flex; align-items: center; background: var(--bg-color); border: 1px solid var(--border-color); padding: 5px 15px 5px 5px; border-radius: 30px; margin: 5px 5px 0 0; gap: 10px; }
        .cast-chip img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .cast-chip-info { display: flex; flex-direction: column; }
        .cast-chip-name { font-size: 12px; font-weight: bold; }
        .cast-chip-role { font-size: 10px; color: var(--text-muted); }
        .cast-chip-actions { display: flex; gap: 8px; margin-left: 5px; }
        .cast-chip-edit { color: var(--accent-color); cursor: pointer; font-size: 11px; }
        .cast-chip-del { color: var(--danger-color); cursor: pointer; font-size: 11px;}

        .dynamic-fields-title { font-size: 13px; font-weight: 800; margin: 20px 0 10px 0; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .field-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; background: var(--sidebar-bg); padding: 8px; border-radius: 8px; border: 1px dashed var(--border-color);}
        .field-row input { flex: 1; padding: 8px; font-size: 13px; background: var(--input-bg); border: 1px solid var(--border-color); color: white; border-radius: 6px; outline: none; }
        .field-row input:focus { border-color: var(--accent-color); }
        .remove-field-btn { color: var(--danger-color); cursor: pointer; padding: 5px; font-size: 14px; }
        .f-img-preview { display: flex; align-items: center; justify-content: center; }

        .submit-btn { width: 100%; padding: 15px; background: var(--text-main); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; transition: 0.2s; font-size: 16px;}
        .submit-btn:hover { background: #fff; transform: translateY(-2px); }

        /* --- DETAY PANELİ --- */
        .slide-panel { position: fixed; top: 0; right: -650px; width: 650px; height: 100vh; background: var(--sidebar-bg); z-index: 1000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; overflow-y: auto; }
        .slide-panel.open { right: 0; }
        .panel-actions { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .p-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); transition:0.2s;}
        .p-btn:hover { background: white; color: black; }

        .panel-content { padding: 40px; }
        .panel-title { font-size: 32px; font-weight: 900; margin-bottom: 20px; line-height: 1.1; }
        .badge { display: inline-block; background: var(--bg-color); border: 1px solid var(--border-color); padding: 6px 15px; border-radius: 20px; font-size: 13px; color: var(--text-muted); margin: 0 8px 8px 0; }
        .gallery-thumbnails { display: flex; gap: 10px; padding: 15px 40px; background: var(--bg-color); overflow-x: auto; border-bottom: 1px solid var(--border-color); }
        .thumb-img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; cursor: pointer; opacity: 0.6; transition: 0.2s; border: 2px solid transparent; }
        .thumb-img:hover, .thumb-img.active { opacity: 1; border-color: var(--accent-color); }

        .p-cast-list { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .p-cast-card { display: flex; align-items: center; gap: 12px; background: var(--bg-color); padding: 8px 15px 8px 8px; border-radius: 40px; border: 1px solid var(--border-color); }
        .p-cast-card img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
        
        .action-icon-btn { background:var(--hover-bg); border:none; color:var(--text-main); padding:6px 10px; border-radius:6px; cursor:pointer; font-size:12px; margin-right:5px; transition:0.2s; }
        .action-icon-btn:hover { background: #333; color: white; }
    </style>
</head>
<body>
    <div class="overlay" id="globalOverlay" onclick="window.closeAll()"></div>

    <div class="global-loader" id="globalLoader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">İşlem başlatılıyor...</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div id="brandLogoContainer" title="Logoyu Değiştir" onclick="document.getElementById('logoInput').click()">
                <div id="logoPlaceholder"><i class="fa-solid fa-image"></i> Logo Yükle</div>
                <img id="brandLogoImg" src="" style="display:none; max-width: 100%; max-height: 50px; object-fit: contain;">
            </div>
            <input type="file" id="logoInput" accept="image/*" style="display:none" onchange="window.uploadLogo(event)">
            <i class="fa-solid fa-bars-staggered menu-toggle-icon" onclick="document.getElementById('sidebar').classList.toggle('hidden')"></i>
        </div>
        <div class="sidebar-content">
            <div class="cat-section-header">
                ARŞİV KATMANLARI
                <button class="manage-cat-btn" onclick="window.openCatManager()" title="Kategorileri Düzenle"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div class="cat-wrapper">
                <div class="category-btn active" id="btn-all" onclick="window.selectAll()">
                    <span class="cat-name-click" style="padding-left: 15px;">
                        <i class="fa-solid fa-folder-open" style="margin-right:8px; color:var(--accent-color)"></i> Tüm Arşiv
                    </span>
                </div>
            </div>
            <div id="dynamicCategories"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div style="display:flex; align-items:center;">
                <button class="view-btn" style="margin-right:15px; font-size:18px;" onclick="document.getElementById('sidebar').classList.toggle('hidden')"><i class="fa-solid fa-indent"></i></button>
                <h2 id="viewTitle" style="font-size: 18px; font-weight: 700;">Tüm Arşiv</h2>
            </div>
            <div class="search-area">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Eser, oyuncu, yazar veya not ara..." oninput="window.renderGallery()">
            </div>
            <div style="display:flex; gap:15px; align-items:center;">
                <div class="view-controls">
                    <button class="view-btn active" id="v-grid" onclick="window.changeView('grid')"><i class="fa-solid fa-grip-vertical"></i></button>
                    <button class="view-btn" id="v-list" onclick="window.changeView('list')"><i class="fa-solid fa-list"></i></button>
                    <button class="view-btn" id="v-masonry" onclick="window.changeView('masonry')"><i class="fa-solid fa-table-cells"></i></button>
                </div>
                <button style="padding: 12px 20px; border-radius: 12px; background:white; color:black; border:none; font-weight:800; cursor:pointer; font-size:14px;" onclick="window.openModal()">+ EKLE</button>
            </div>
        </div>
        <div class="content-area"><div id="galleryGrid" class="grid-view"></div></div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-sidebar">
            <div style="font-size:11px; font-weight:bold; color:var(--text-muted); margin-bottom:15px; letter-spacing:1px;">SİSTEM ŞABLONLARI</div>
            <div class="tab-btn active" id="tab-film" onclick="window.setFormType('film')"><i class="fa-solid fa-film"></i> Film/Dizi</div>
            <div class="tab-btn" id="tab-kitap" onclick="window.setFormType('kitap')"><i class="fa-solid fa-book"></i> Kitap</div>
            <div class="tab-btn" id="tab-ayrac" onclick="window.setFormType('ayrac')"><i class="fa-solid fa-bookmark"></i> Ayraç/Obje</div>
            <div class="tab-btn" id="tab-ozel" onclick="window.setFormType('ozel')"><i class="fa-solid fa-cube"></i> Özel Kanva</div>
            
            <div style="font-size:11px; font-weight:bold; color:var(--text-muted); margin:25px 0 15px 0; letter-spacing:1px; border-top:1px solid #333; padding-top:15px;">KAYITLI ŞABLONLARIM</div>
            <div id="savedTemplatesList"></div>
        </div>
        
        <div class="modal-body">
            <i class="fa-solid fa-xmark" style="position:absolute; top:20px; right:25px; cursor:pointer; font-size:24px; color:var(--text-muted);" onclick="window.closeAll()"></i>
            <h3 id="modalHeaderTitle" style="margin-bottom: 25px; font-weight: 900; font-size: 26px;">Yeni Eser Ekle</h3>
            
            <input type="hidden" id="editId">
            <input type="hidden" id="currentItemType" value="film">

            <div id="moduleToolbar" class="module-toolbar">
                <div class="mod-title">
                    TUVALE MODÜL EKLE 
                    <button style="background:none; border:1px solid var(--accent-color); color:var(--accent-color); padding:4px 8px; border-radius:6px; font-size:10px; font-weight:bold; cursor:pointer;" onclick="window.saveCustomTemplate()"><i class="fa-solid fa-star"></i> BU ŞABLONU KAYDET</button>
                </div>
                <button class="mod-btn" id="btn-mod-images" onclick="window.showModule('wrap-images', this)"><i class="fa-solid fa-image"></i> Görseller</button>
                <button class="mod-btn" id="btn-mod-cast" onclick="window.showModule('wrap-cast', this)"><i class="fa-solid fa-users"></i> Kişi/Kadro</button>
                <button class="mod-btn" id="btn-mod-desc" onclick="window.showModule('wrap-desc', this)"><i class="fa-solid fa-align-left"></i> Açıklama</button>
                <button class="mod-btn" id="btn-mod-custom" onclick="window.showModule('wrap-custom', this)"><i class="fa-solid fa-sliders"></i> Özel Veri</button>
            </div>

            <div class="form-group"><label>Eser Adı</label><input type="text" id="in-title" required></div>
            <div class="form-row">
                <div class="form-group"><label>Ana Kategori</label><select id="in-cat" onchange="window.updateSubSelect()"></select></div>
                <div class="form-group"><label>Alt Kategori</label><select id="in-sub" onchange="window.updateSubSubSelect()"></select></div>
                <div class="form-group"><label>3. Seviye Alt</label><select id="in-sub-sub"></select></div>
            </div>

            <div id="wrap-images" class="form-group">
                <label>Görseller Ekle <span style="font-weight:normal; color:#666; font-size:10px;">(Yerel Önizleme - Kotadan Yemez!)</span></label>
                <input type="file" id="in-file" accept="image/*" multiple style="padding-top:10px;" onchange="window.handleLocalImageSelect(event)">
                <div id="existingImagesPreview" class="existing-img-preview"></div>
            </div>

            <div id="wrap-cast" class="cast-builder">
                <label style="display:block; margin-bottom:10px; font-size:11px; font-weight:bold; color:var(--text-muted);">KİŞİLER / KADRO</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="hidden" id="tempCastImageUrl"> 
                    
                    <div id="castExistingImgPreview" style="display:none; position:relative; width:40px; height:40px; margin-right:5px;">
                        <img id="castExistingImg" src="" style="width:100%;height:100%;object-fit:cover;border-radius:50%; border:1px solid #555;">
                        <i class="fa-solid fa-circle-xmark" style="position:absolute; top:-5px; right:-5px; color:var(--danger-color); cursor:pointer; background:var(--bg-color); border-radius:50%;" onclick="window.removeTempCastImg()"></i>
                    </div>

                    <input type="text" id="tempCastName" placeholder="Kişi Adı" style="flex:1; padding:10px; border-radius:8px; background:var(--bg-color); border:1px solid var(--border-color); color:white; font-size:13px;">
                    <select id="tempCastRole" style="padding:10px; border-radius:8px; background:var(--bg-color); border:1px solid var(--border-color); color:white; font-size:13px;">
                        <option>Yönetmen</option><option>Oyuncu</option><option>Yazar</option><option>Çizer</option><option>Karakter</option>
                    </select>
                    <input type="file" id="tempCastFile" accept="image/*" title="Yeni Profil Fotoğrafı" style="width:105px; font-size:10px;">
                    <button type="button" id="castAddBtn" style="padding:10px 15px; border-radius:8px; background:var(--accent-color); border:none; color:white; font-weight:bold; cursor:pointer;" onclick="window.addCastMember()">Ekle</button>
                </div>
                <div id="castChipsContainer" style="margin-top:10px;"></div>
            </div>

            <div id="wrap-desc" class="form-group"><label>Açıklama & Notlar</label><textarea id="in-desc" style="height:80px;"></textarea></div>

            <div id="wrap-custom">
                <div class="dynamic-fields-title">
                    ÖZEL ALANLAR 
                    <div>
                        <button class="manage-cat-btn" onclick="window.addDynamicFieldRow('','','text')" style="font-size:11px; color:var(--text-main); font-weight:bold; margin-right:10px; background:var(--hover-bg); padding:4px 8px; border-radius:4px;">+ Metin</button>
                        <button class="manage-cat-btn" onclick="window.addDynamicFieldRow('','','image')" style="font-size:11px; color:var(--accent-color); font-weight:bold; background:var(--hover-bg); padding:4px 8px; border-radius:4px;">+ Görsel</button>
                    </div>
                </div>
                <div id="dynamicFieldsContainer"></div>
            </div>

            <button class="submit-btn" id="saveBtn" onclick="window.saveItem()">ARŞİVE KAYDET</button>
        </div>
    </div>

    <div class="slide-panel" id="detailPanel">
        <div class="panel-actions">
            <div class="p-btn" onclick="window.editCurrentItem()"><i class="fa-solid fa-pen"></i></div>
            <div class="p-btn" style="color:var(--danger-color)" onclick="window.deleteCurrentItem()"><i class="fa-solid fa-trash"></i></div>
            <div class="p-btn" onclick="window.closeAll()"><i class="fa-solid fa-xmark"></i></div>
        </div>
        <div id="panelVisual"></div>
        <div id="galleryThumbnails" class="gallery-thumbnails" style="display:none;"></div>
        <div class="panel-content">
            <h1 class="panel-title" id="p-title">Başlık</h1>
            <div id="p-badges"></div>
            <p class="panel-desc" id="p-desc"></p>
            <div id="p-cast" class="p-cast-list"></div>
        </div>
    </div>

    <div class="modal" id="catModal" style="width:650px; padding:35px;">
        <div class="modal-header"><h3>Kategorileri Yönet</h3><i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="window.closeAll()"></i></div>
        <div id="catManList" style="margin-bottom:20px; max-height: 450px; overflow-y: auto; padding-right:10px;"></div>
        <button class="submit-btn" style="background:#333; color:white; border:1px dashed #666;" onclick="window.openEditCatModal(null, null, null)">+ Yeni Ana Kategori Yarat</button>
    </div>
    
    <div class="modal" id="editCatModal" style="width:400px; padding:35px; z-index:1003;">
        <div class="modal-header"><h3 id="editCatTitle">Kategori Düzenle</h3><i class="fa-solid fa-xmark" style="cursor:pointer;" onclick="window.closeEditCatModal()"></i></div>
        <input type="hidden" id="ec-mId"> <input type="hidden" id="ec-sId"> <input type="hidden" id="ec-ssId">
        <div class="form-group"><label>Kategori İsmi</label><input type="text" id="ec-name" required></div>
        <div class="form-group"><label>İkon (Opsiyonel)</label><input type="file" id="ec-icon" accept="image/*" style="padding-top:10px;"></div>
        <button class="submit-btn" id="saveEditCatBtn" onclick="window.saveEditCat()">Kaydet</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, getDoc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCAHySPlWjGqBcyLmcW1aZxnUkQjzRe-xE",
            authDomain: "koleksiyoncubirdeli.firebaseapp.com",
            projectId: "koleksiyoncubirdeli",
            storageBucket: "koleksiyoncubirdeli.firebasestorage.app",
            messagingSenderId: "925853880419",
            appId: "1:925853880419:web:9174ef2d0e12b16214a856",
            measurementId: "G-PP0W2M3GQP"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/de3kvm7zl/image/upload";
        const CLOUDINARY_PRESET = "ml_default";

        let allItems = [], categoryTree = [], appSettings = { logoUrl: '' }, savedTemplates = [];
        let currentMain = 'Tümü', currentSub = null, currentSubSub = null, viewMode = 'grid', activeId = null;
        
        let currentCastArray = []; 
        let currentImagesArray = []; 
        let pendingImageFiles = []; 

        const uploadImageToCloud = async (file) => {
            const fd = new FormData(); fd.append("file", file); fd.append("upload_preset", CLOUDINARY_PRESET);
            const res = await fetch(CLOUDINARY_URL, { method:"POST", body:fd }); return (await res.json()).secure_url;
        };

        const loadSystemData = async () => {
            const [snapSet, snapCat, snapTemp] = await Promise.all([ getDoc(doc(db, "settings", "general")), getDoc(doc(db, "settings", "categories")), getDoc(doc(db, "settings", "templates")) ]);
            
            if (snapSet.exists() && snapSet.data().logoUrl) {
                appSettings = snapSet.data(); document.getElementById('logoPlaceholder').style.display = 'none';
                document.getElementById('brandLogoImg').src = appSettings.logoUrl; document.getElementById('brandLogoImg').style.display = 'block';
            }
            categoryTree = snapCat.exists() ? snapCat.data().tree : [];
            savedTemplates = snapTemp.exists() ? snapTemp.data().list || [] : [];
            renderSidebar(); updateInCatSelect(); renderTemplateTabs();
        };

        window.uploadLogo = async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const p = document.getElementById('logoPlaceholder'), i = document.getElementById('brandLogoImg');
            p.style.display = 'block'; i.style.display = 'none'; p.innerHTML = 'Yükleniyor...';
            try { appSettings.logoUrl = await uploadImageToCloud(file); await setDoc(doc(db, "settings", "general"), appSettings); p.style.display = 'none'; i.src = appSettings.logoUrl; i.style.display = 'block'; } catch(err) { p.innerHTML = 'Hata!'; }
        };

        // --- SİDEBAR RENDER ---
        const renderSidebar = () => {
            const cont = document.getElementById('dynamicCategories'); cont.innerHTML = '';
            categoryTree.forEach(cat => {
                const wrap = document.createElement('div'); wrap.className = 'cat-wrapper'; wrap.setAttribute('data-id', cat.id);
                const iconHtml = cat.iconUrl ? `<img src="${cat.iconUrl}" class="cat-icon-img">` : `<i class="fa-solid fa-folder"></i>`;
                
                wrap.innerHTML = `
                    <div class="category-btn" id="cbtn-${cat.id}">
                        <i class="fa-solid fa-ellipsis-vertical drag-handle"></i>
                        <span class="cat-name-click" onclick="window.selectMain('${cat.name}', '${cat.id}')">${iconHtml} <span>${cat.name}</span></span>
                        ${cat.sub && cat.sub.length > 0 ? `<div class="toggle-sub" id="toggle-${cat.id}" onclick="window.toggleSubMenu('slist-${cat.id}', 'toggle-${cat.id}', event)"><i class="fa-solid fa-chevron-down"></i></div>` : ''}
                    </div>
                    <div class="sub-category-list" id="slist-${cat.id}" data-parent-id="${cat.id}">
                        ${(cat.sub || []).map(s => {
                            const subIconHtml = s.iconUrl ? `<img src="${s.iconUrl}" class="cat-icon-img">` : `<span style="opacity:0.5;">↳</span>`;
                            const hasSS = s.sub && s.sub.length > 0;
                            return `
                            <div class="sub-item-container" data-id="${s.id}">
                                <div class="sub-btn-wrapper" id="swrap-${s.id}">
                                    <i class="fa-solid fa-grip-vertical sub-drag-handle"></i>
                                    <button class="sub-btn" id="sbtn-${s.id}" onclick="window.selectSub('${cat.name}', '${s.name}', '${cat.id}', '${s.id}')">${subIconHtml} <span>${s.name}</span></button>
                                    ${hasSS ? `<div class="toggle-sub" id="toggle-${s.id}" onclick="window.toggleSubMenu('sslist-${s.id}', 'toggle-${s.id}', event)"><i class="fa-solid fa-chevron-down" style="font-size:10px;"></i></div>` : ''}
                                </div>
                                <div class="sub-sub-category-list" id="sslist-${s.id}">
                                    ${(s.sub || []).map(ss => {
                                        const ssIcon = ss.iconUrl ? `<img src="${ss.iconUrl}" class="cat-icon-img" style="width:14px;height:14px;">` : `<span style="opacity:0.3; font-size:10px;">•</span>`;
                                        return `<button class="sub-sub-btn" id="ssbtn-${ss.id}" onclick="window.selectSubSub('${cat.name}', '${s.name}', '${ss.name}', '${cat.id}', '${s.id}', '${ss.id}')">${ssIcon} <span>${ss.name}</span></button>`;
                                    }).join('')}
                                </div>
                            </div>`
                        }).join('')}
                    </div>`;
                cont.appendChild(wrap);
            });
            Sortable.create(cont, { handle: '.drag-handle', animation: 150, onEnd: async (evt) => { const item = categoryTree.splice(evt.oldIndex, 1)[0]; categoryTree.splice(evt.newIndex, 0, item); await saveTreeSilent(); } });
            document.querySelectorAll('.sub-category-list').forEach(list => { 
                Sortable.create(list, { handle: '.sub-drag-handle', animation: 150, onEnd: async (evt) => { const p = categoryTree.find(c => c.id === list.getAttribute('data-parent-id')); if(p) { const item = p.sub.splice(evt.oldIndex, 1)[0]; p.sub.splice(evt.newIndex, 0, item); await saveTreeSilent(); } }}); 
            });
        };

        window.selectMain = (name, id) => { currentMain = name; currentSub = null; currentSubSub = null; document.getElementById('viewTitle').innerText = name; clearSidebarActive(); document.getElementById(`cbtn-${id}`).classList.add('active'); const slist = document.getElementById(`slist-${id}`); if(slist && !slist.classList.contains('open')) { slist.classList.add('open'); document.getElementById(`toggle-${id}`)?.classList.add('rotated'); } window.renderGallery(); };
        window.selectSub = (mName, sName, mId, sId) => { currentMain = mName; currentSub = sName; currentSubSub = null; document.getElementById('viewTitle').innerText = `${mName} / ${sName}`; clearSidebarActive(); document.getElementById(`cbtn-${mId}`).classList.add('active'); document.getElementById(`sbtn-${sId}`).classList.add('active'); const sslist = document.getElementById(`sslist-${sId}`); if(sslist && !sslist.classList.contains('open')) { sslist.classList.add('open'); document.getElementById(`toggle-${sId}`)?.classList.add('rotated'); } window.renderGallery(); };
        window.selectSubSub = (mName, sName, ssName, mId, sId, ssId) => { currentMain = mName; currentSub = sName; currentSubSub = ssName; document.getElementById('viewTitle').innerText = `${mName} / ${sName} / ${ssName}`; clearSidebarActive(); document.getElementById(`cbtn-${mId}`).classList.add('active'); document.getElementById(`sbtn-${sId}`).classList.add('active'); document.getElementById(`ssbtn-${ssId}`).classList.add('active'); window.renderGallery(); };
        window.selectAll = () => { currentMain = 'Tümü'; currentSub = null; currentSubSub = null; document.getElementById('viewTitle').innerText = 'Tüm Arşiv'; clearSidebarActive(); document.getElementById('btn-all').classList.add('active'); window.renderGallery(); };
        const clearSidebarActive = () => { document.querySelectorAll('.category-btn, .sub-btn, .sub-sub-btn').forEach(b => b.classList.remove('active')); };
        window.toggleSubMenu = (listId, iconId, e) => { e.stopPropagation(); document.getElementById(listId)?.classList.toggle('open'); document.getElementById(iconId)?.classList.toggle('rotated'); };
        window.changeView = (mode) => { viewMode = mode; document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active')); document.getElementById(`v-${mode}`).classList.add('active'); window.renderGallery(); };

        const loadData = () => { onSnapshot(query(collection(db, "arsiv"), orderBy("timestamp", "desc")), (s) => { allItems = s.docs.map(d => ({ id: d.id, ...d.data() })); window.renderGallery(); }); };

        window.renderGallery = () => {
            const grid = document.getElementById('galleryGrid'); grid.className = `${viewMode}-view`; grid.innerHTML = '';
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filtered = allItems.filter(item => {
                const matchMain = currentMain === 'Tümü' || item.category === currentMain;
                const matchSub = !currentSub || item.subCategory === currentSub;
                const matchSubSub = !currentSubSub || item.subSubCategory === currentSubSub;
                let matchSearch = !search || item.title.toLowerCase().includes(search) || (item.description && item.description.toLowerCase().includes(search));
                if (item.cast && !matchSearch) { matchSearch = item.cast.some(c => c.name.toLowerCase().includes(search) || c.role.toLowerCase().includes(search)); }
                return matchMain && matchSub && matchSubSub && matchSearch;
            });

            if(filtered.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1; padding:50px; text-align:center; color:#888;">Eser bulunamadı.</div>'; return; }

            filtered.forEach(item => {
                const card = document.createElement('div'); card.className = 'card'; card.onclick = () => window.openDetail(item.id);
                const coverUrl = (item.images && item.images.length > 0) ? item.images[0] : item.imageUrl;
                let visual = coverUrl ? `<div class="img-container"><div class="img-blur" style="background-image:url('${coverUrl}')"></div><img src="${coverUrl}" class="img-front"></div>` : `<div class="text-cover">${item.title.substring(0,2).toUpperCase()}</div>`;
                card.innerHTML = `${visual}<div class="card-info"><div class="card-title">${item.title}</div><div class="card-meta"><span>${item.category} ${item.subCategory ? '> '+item.subCategory : ''}</span></div></div>`;
                grid.appendChild(card);
            });
        };

        // --- ŞABLON KAYIT SİSTEMİ ---
        const renderTemplateTabs = () => {
            document.getElementById('savedTemplatesList').innerHTML = savedTemplates.map(t => `<div class="tab-btn" id="tab-${t.id}" onclick="window.loadCustomTemplate('${t.id}')"><i class="fa-solid fa-star" style="color:var(--accent-color)"></i> ${t.name} <i class="fa-solid fa-trash" style="margin-left:auto; font-size:12px; color:var(--text-muted);" onclick="window.delTemplate('${t.id}', event)"></i></div>`).join('');
        };

        window.saveCustomTemplate = async () => {
            const name = prompt("Şablon Adı:"); if(!name) return;
            const activeMods = [];
            if(document.getElementById('wrap-images').style.display === 'block') activeMods.push('images');
            if(document.getElementById('wrap-cast').style.display === 'block') activeMods.push('cast');
            if(document.getElementById('wrap-desc').style.display === 'block') activeMods.push('desc');
            if(document.getElementById('wrap-custom').style.display === 'block') activeMods.push('custom');
            const fields = []; document.querySelectorAll('.field-row').forEach(row => fields.push({ key: row.querySelector('.f-key').value, type: row.dataset.type || 'text' }));
            
            savedTemplates.push({ id: Date.now().toString(), name, activeMods, fields, type: 'ozel' });
            await setDoc(doc(db, "settings", "templates"), { list: savedTemplates });
            renderTemplateTabs(); alert("Şablon kaydedildi!");
        };

        window.delTemplate = async (id, e) => { e.stopPropagation(); if(confirm('Şablon silinsin mi?')) { savedTemplates = savedTemplates.filter(t => t.id !== id); await setDoc(doc(db, "settings", "templates"), { list: savedTemplates }); renderTemplateTabs(); } };

        window.loadCustomTemplate = (id) => {
            const t = savedTemplates.find(x => x.id === id); if(!t) return;
            document.getElementById('currentItemType').value = t.id; 
            document.querySelectorAll('.tab-btn').forEach(tb => tb.classList.remove('active')); document.getElementById(`tab-${id}`).classList.add('active');
            
            document.getElementById('moduleToolbar').style.display = 'flex';
            document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('added'));
            ['images','cast','desc','custom'].forEach(m => document.getElementById(`wrap-${m}`).style.display = 'none');
            
            t.activeMods.forEach(m => { document.getElementById(`wrap-${m}`).style.display = 'block'; document.getElementById(`btn-mod-${m}`).classList.add('added'); });
            
            document.getElementById('dynamicFieldsContainer').innerHTML = '';
            t.fields.forEach(f => window.addDynamicFieldRow(f.key, '', f.type));
        };

        // --- YEREL ÖNİZLEME (LOCAL PREVIEW) ---
        window.handleLocalImageSelect = (e) => {
            const files = e.target.files; if (!files || files.length === 0) return;
            for(let i=0; i<files.length; i++) { pendingImageFiles.push(files[i]); }
            e.target.value = ''; 
            renderExistingImagesPreview();
        };

        const renderExistingImagesPreview = () => {
            const cont = document.getElementById('existingImagesPreview');
            cont.innerHTML = ''; 
            currentImagesArray.forEach((url, idx) => {
                cont.innerHTML += `<div class="img-box"><img src="${url}"><i class="fa-solid fa-circle-xmark del-icon" onclick="window.removeExistingImage(${idx})"></i></div>`;
            });
            pendingImageFiles.forEach((file, idx) => {
                const localUrl = URL.createObjectURL(file);
                cont.innerHTML += `<div class="img-box pending"><img src="${localUrl}"><i class="fa-solid fa-circle-xmark del-icon" style="color:#ffa500;" onclick="window.removePendingImage(${idx})" title="İptal Et"></i></div>`;
            });
        };

        window.removeExistingImage = (idx) => { currentImagesArray.splice(idx, 1); renderExistingImagesPreview(); };
        window.removePendingImage = (idx) => { pendingImageFiles.splice(idx, 1); renderExistingImagesPreview(); };

        // --- MODAL STATE SIFIRLAMA ---
        const resetFormState = () => {
            document.getElementById('editId').value = '';
            document.getElementById('modalHeaderTitle').innerText = "Yeni Eser Ekle";
            document.getElementById('in-title').value = ''; document.getElementById('in-desc').value = ''; document.getElementById('in-file').value = '';
            
            document.getElementById('castAddBtn').innerText = "Ekle";
            document.getElementById('castAddBtn').removeAttribute('data-editing-id');
            document.getElementById('tempCastName').value = ''; document.getElementById('tempCastFile').value = ''; document.getElementById('tempCastImageUrl').value = '';
            document.getElementById('castExistingImgPreview').style.display = 'none';

            currentCastArray = []; currentImagesArray = []; pendingImageFiles = []; 
            renderCastChips(); renderExistingImagesPreview(); 
            document.getElementById('dynamicFieldsContainer').innerHTML = '';
        };

        window.openModal = () => {
            resetFormState();
            document.getElementById('addModal').classList.add('show'); document.getElementById('globalOverlay').classList.add('show');
            window.setFormType('film');
        };

        window.setFormType = (type) => {
            document.getElementById('currentItemType').value = type;
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active')); 
            if(document.getElementById(`tab-${type}`)) document.getElementById(`tab-${type}`).classList.add('active');
            
            const tBar = document.getElementById('moduleToolbar'), wImg = document.getElementById('wrap-images'), wCast = document.getElementById('wrap-cast'), wDesc = document.getElementById('wrap-desc'), wCus = document.getElementById('wrap-custom');
            document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('added'));

            if (type === 'ozel') { tBar.style.display = 'flex'; wImg.style.display = 'none'; wCast.style.display = 'none'; wDesc.style.display = 'none'; wCus.style.display = 'none'; } 
            else { tBar.style.display = 'none'; wImg.style.display = 'block'; wDesc.style.display = 'block'; wCus.style.display = 'block'; if (type === 'ayrac') { wCast.style.display = 'none'; } else { wCast.style.display = 'block'; } }
            
            if(!document.getElementById('editId').value && type !== 'ozel' && !savedTemplates.some(t=>t.id===type)) { 
                document.getElementById('dynamicFieldsContainer').innerHTML = ''; 
                if(type === 'film') window.addDynamicFieldRow('IMDB Puanı', '', 'text'); 
                if(type === 'kitap') window.addDynamicFieldRow('Sayfa Sayısı', '', 'text'); 
            }
        };

        window.showModule = (wrapId, btnEl) => { document.getElementById(wrapId).style.display = 'block'; btnEl.classList.add('added'); };

        // --- KİŞİ (CAST) SİSTEMİ ---
        window.addCastMember = async () => {
            const name = document.getElementById('tempCastName').value.trim(), role = document.getElementById('tempCastRole').value, fileInput = document.getElementById('tempCastFile'), btn = document.getElementById('castAddBtn');
            const editingId = btn.getAttribute('data-editing-id'); const hiddenImg = document.getElementById('tempCastImageUrl').value;
            
            if(!name) return; 

            let imageUrl = hiddenImg; 
            let localFile = null;
            if (fileInput.files[0]) { 
                localFile = fileInput.files[0];
                imageUrl = URL.createObjectURL(localFile); 
            }

            if(editingId) {
                const idx = currentCastArray.findIndex(x => x.id === editingId);
                if(idx > -1) {
                    currentCastArray[idx].name = name; currentCastArray[idx].role = role; currentCastArray[idx].imageUrl = imageUrl;
                    if(localFile) currentCastArray[idx].localFile = localFile; 
                }
                btn.removeAttribute('data-editing-id');
            } else { 
                currentCastArray.push({ id: Date.now().toString(), name, role, imageUrl, localFile }); 
            }

            document.getElementById('tempCastName').value = ''; fileInput.value = ''; document.getElementById('tempCastImageUrl').value = ''; 
            document.getElementById('castExistingImgPreview').style.display = 'none';
            btn.innerText = "Ekle"; renderCastChips();
        };

        window.removeTempCastImg = () => { document.getElementById('tempCastImageUrl').value = ''; document.getElementById('castExistingImgPreview').style.display = 'none'; };

        const renderCastChips = () => {
            document.getElementById('castChipsContainer').innerHTML = currentCastArray.map(c => `
                <div class="cast-chip">
                    ${c.imageUrl ? `<img src="${c.imageUrl}">` : `<div style="width:30px;height:30px;border-radius:50%;background:#444;display:flex;align-items:center;justify-content:center;font-size:10px;">${c.name.substring(0,1)}</div>`}
                    <div class="cast-chip-info"><span class="cast-chip-name">${c.name}</span><span class="cast-chip-role">${c.role}</span></div>
                    <div class="cast-chip-actions"><i class="fa-solid fa-pen cast-chip-edit" onclick="window.editCast('${c.id}')"></i><i class="fa-solid fa-xmark cast-chip-del" onclick="window.removeCast('${c.id}')"></i></div>
                </div>`).join('');
        };
        
        window.editCast = (id) => {
            const c = currentCastArray.find(x => x.id === id); if(!c) return;
            document.getElementById('tempCastName').value = c.name; document.getElementById('tempCastRole').value = c.role; document.getElementById('tempCastImageUrl').value = c.imageUrl || '';
            if(c.imageUrl) { document.getElementById('castExistingImg').src = c.imageUrl; document.getElementById('castExistingImgPreview').style.display = 'block'; } else { document.getElementById('castExistingImgPreview').style.display = 'none'; }
            const btn = document.getElementById('castAddBtn'); btn.innerText = "Güncelle"; btn.setAttribute('data-editing-id', id);
        };
        
        window.removeCast = (id) => { currentCastArray = currentCastArray.filter(c => c.id !== id); renderCastChips(); };

        // --- ÖZEL ALANLAR ---
        window.addDynamicFieldRow = (key = '', val = '', type = 'text') => { 
            const cont = document.getElementById('dynamicFieldsContainer'); const row = document.createElement('div'); row.className = 'field-row'; row.dataset.type = type;
            if (type === 'text') {
                row.innerHTML = `<input type="text" placeholder="Özellik Adı" value="${key}" class="f-key"><input type="text" placeholder="Değer" value="${val}" class="f-val"><i class="fa-solid fa-trash-can remove-field-btn" onclick="this.parentElement.remove()"></i>`; 
            } else if (type === 'image') {
                let imgHtml = val ? `<div style="position:relative; width:35px; height:35px; margin-left:10px;"><img src="${val}" style="width:100%;height:100%;object-fit:cover;border-radius:4px;"><i class="fa-solid fa-circle-xmark" style="position:absolute;top:-5px;right:-5px;color:var(--danger-color);cursor:pointer;background:var(--bg-color);border-radius:50%;" onclick="this.parentElement.remove(); this.parentElement.parentElement.querySelector('.f-val-hidden').value='';"></i></div>` : '';
                row.innerHTML = `<input type="text" placeholder="Görselin Adı" value="${key}" class="f-key"><input type="file" accept="image/*" class="f-file" style="flex:1; padding:5px; font-size:11px;"><input type="hidden" class="f-val-hidden" value="${val}"><div class="f-img-preview">${imgHtml}</div><i class="fa-solid fa-trash-can remove-field-btn" onclick="this.parentElement.remove()"></i>`; 
            }
            cont.appendChild(row); 
        };

        // --- SİNEMATİK KAYIT MOTORU ---
        window.saveItem = async () => {
            const id = document.getElementById('editId').value, title = document.getElementById('in-title').value;
            if(!title) { alert("Eser adı zorunlu!"); return; }

            const loader = document.getElementById('globalLoader');
            const loaderText = document.getElementById('loaderText');
            loader.classList.add('show');
            loaderText.innerText = "Güvenli bağlantı kuruluyor...";

            try {
                // 1. Bekleyen Ana Resimleri Yükle
                if (pendingImageFiles.length > 0) {
                    loaderText.innerText = `Ana görseller buluta aktarılıyor (0/${pendingImageFiles.length})...`;
                    const uploadedUrls = await Promise.all(pendingImageFiles.map(f => uploadImageToCloud(f)));
                    currentImagesArray.push(...uploadedUrls);
                }

                // 2. Bekleyen Oyuncu/Kadro Resimlerini Yükle
                let hasCastImages = currentCastArray.some(c => c.localFile);
                if (hasCastImages) {
                    loaderText.innerText = "Kişi/Kadro görselleri senkronize ediliyor...";
                    for (let c of currentCastArray) {
                        if (c.localFile) { c.imageUrl = await uploadImageToCloud(c.localFile); delete c.localFile; }
                    }
                }

                // 3. Özel Alanlardaki Resimleri Bekle ve Yükle
                loaderText.innerText = "Özel veri alanları işleniyor...";
                const fields = []; 
                const rows = document.querySelectorAll('.field-row');
                const customFieldPromises = Array.from(rows).map(async (row) => {
                    const type = row.dataset.type || 'text'; const key = row.querySelector('.f-key').value;
                    if(type === 'text') { return { key, val: row.querySelector('.f-val').value, type: 'text' }; }
                    else if(type === 'image') {
                        const fileInput = row.querySelector('.f-file'); const hiddenVal = row.querySelector('.f-val-hidden').value;
                        let finalUrl = hiddenVal;
                        if(fileInput && fileInput.files.length > 0) { finalUrl = await uploadImageToCloud(fileInput.files[0]); }
                        if(finalUrl || key) return { key, val: finalUrl, type: 'image' };
                    }
                    return null;
                });

                const resolvedFields = await Promise.all(customFieldPromises);
                resolvedFields.forEach(f => { if(f) fields.push(f); });

                // 4. Veritabanına Yaz
                loaderText.innerText = "Veritabanı güncelleniyor...";
                const data = {
                    title: title, category: document.getElementById('in-cat').value, subCategory: document.getElementById('in-sub').value, subSubCategory: document.getElementById('in-sub-sub').value,
                    description: document.getElementById('in-desc').value, itemType: document.getElementById('currentItemType').value,
                    customFields: fields, cast: currentCastArray, timestamp: Date.now(), images: currentImagesArray
                };

                id ? await updateDoc(doc(db, "arsiv", id), data) : await addDoc(collection(db, "arsiv"), data);
                
                // 5. Başarılı Kapanış
                loaderText.innerText = "Mühürlendi! Arşive eklendi.";
                setTimeout(() => {
                    loader.classList.remove('show');
                    window.closeAll(); 
                }, 800);

            } catch(e) {
                console.error(e); 
                loaderText.innerText = "HATA: İşlem başarısız oldu!";
                setTimeout(() => { loader.classList.remove('show'); }, 2000);
            }
        };

        // --- DETAY PANELİ VE DÜZENLEME ---
        window.openDetail = (id) => {
            activeId = id; const item = allItems.find(i => i.id === id);
            const visual = document.getElementById('panelVisual'), thumbsCont = document.getElementById('galleryThumbnails');
            const coverUrl = (item.images && item.images.length > 0) ? item.images[0] : item.imageUrl;

            if(coverUrl) {
                visual.innerHTML = `<div class="img-container" style="height:450px;"><div class="img-blur" id="mainBlur" style="background-image:url('${coverUrl}')"></div><img src="${coverUrl}" id="mainImg" class="img-front"></div>`;
                if(item.images && item.images.length > 1) { thumbsCont.style.display = 'flex'; thumbsCont.innerHTML = item.images.map(img => `<img src="${img}" class="thumb-img" onclick="window.changeMainImg('${img}', this)">`).join(''); } else { thumbsCont.style.display = 'none'; }
            } else { visual.innerHTML = `<div class="text-cover" style="height:400px; font-size:80px;">${item.title.substring(0,2).toUpperCase()}</div>`; thumbsCont.style.display = 'none'; }

            document.getElementById('p-title').innerText = item.title; document.getElementById('p-desc').innerText = item.description || '';
            const badges = document.getElementById('p-badges'); 
            let catStr = item.category; if(item.subCategory) catStr += ' / ' + item.subCategory; if(item.subSubCategory) catStr += ' / ' + item.subSubCategory;
            badges.innerHTML = `<span class="badge"><b>KATEGORİ:</b> ${catStr}</span>`;
            if(item.customFields) item.customFields.forEach(f => { 
                if(f.val) {
                    if(f.type === 'image') badges.innerHTML += `<span class="badge" style="display:inline-flex; align-items:center; gap:5px; padding:4px 10px;"><b>${f.key.toUpperCase()}:</b> <a href="${f.val}" target="_blank"><img src="${f.val}" style="width:20px;height:20px;object-fit:cover;border-radius:4px;cursor:pointer;"></a></span>`;
                    else badges.innerHTML += `<span class="badge"><b>${f.key.toUpperCase()}:</b> ${f.val}</span>`; 
                }
            });

            const castCont = document.getElementById('p-cast');
            if(item.cast && item.cast.length > 0) { castCont.style.display = 'flex'; castCont.innerHTML = item.cast.map(c => `<div class="p-cast-card">${c.imageUrl ? `<img src="${c.imageUrl}">` : `<div style="width:45px;height:45px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;color:white;">${c.name.substring(0,1)}</div>`}<div><div style="font-size:13px; font-weight:bold;">${c.name}</div><div style="font-size:11px; color:var(--accent-color);">${c.role}</div></div></div>`).join(''); } else { castCont.style.display = 'none'; }
            document.getElementById('detailPanel').classList.add('open'); document.getElementById('globalOverlay').classList.add('show');
        };

        window.changeMainImg = (url, el) => { document.getElementById('mainImg').src = url; document.getElementById('mainBlur').style.backgroundImage = `url('${url}')`; document.querySelectorAll('.thumb-img').forEach(i => i.classList.remove('active')); el.classList.add('active'); };

        window.editCurrentItem = () => {
            const item = allItems.find(i => i.id === activeId); resetFormState(); document.getElementById('editId').value = item.id;
            document.getElementById('modalHeaderTitle').innerText = "Eseri Düzenle";
            document.getElementById('in-title').value = item.title; 
            document.getElementById('in-cat').value = item.category; window.updateSubSelect(); 
            document.getElementById('in-sub').value = item.subCategory || ''; window.updateSubSubSelect();
            document.getElementById('in-sub-sub').value = item.subSubCategory || '';
            document.getElementById('in-desc').value = item.description || '';
            
            // Eğer JSON'dan eski localFile (hatalı veri) kalmışsa temizleyelim ki bug yapmasın
            currentCastArray = (item.cast || []).map(c => { delete c.localFile; return c; }); 
            renderCastChips(); 
            
            currentImagesArray = item.images || (item.imageUrl ? [item.imageUrl] : []); renderExistingImagesPreview();
            
            document.getElementById('dynamicFieldsContainer').innerHTML = ''; if(item.customFields) item.customFields.forEach(f => window.addDynamicFieldRow(f.key, f.val, f.type));

            const type = item.itemType || 'ozel';
            if(['film','kitap','ayrac','ozel'].includes(type) || savedTemplates.some(t=>t.id===type)) window.setFormType(type); else window.setFormType('ozel');
            
            if (type === 'ozel' || savedTemplates.some(t=>t.id===type)) {
                if (currentImagesArray.length > 0) window.showModule('wrap-images', document.getElementById('btn-mod-images'));
                if (currentCastArray.length > 0) window.showModule('wrap-cast', document.getElementById('btn-mod-cast'));
                if (item.description) window.showModule('wrap-desc', document.getElementById('btn-mod-desc'));
                if (item.customFields && item.customFields.length > 0) window.showModule('wrap-custom', document.getElementById('btn-mod-custom'));
            }
            document.getElementById('detailPanel').classList.remove('open'); document.getElementById('addModal').classList.add('show');
        };

        window.deleteCurrentItem = async () => { if(confirm("Bu eseri silmek istediğine emin misin?")) { await deleteDoc(doc(db, "arsiv", activeId)); window.closeAll(); } };
        
        window.closeAll = () => { 
            resetFormState(); 
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('show')); 
            document.getElementById('detailPanel').classList.remove('open'); 
            document.getElementById('globalOverlay').classList.remove('show'); 
        };
        
        const updateInCatSelect = () => { const s = document.getElementById('in-cat'); s.innerHTML = categoryTree.map(c => `<option value="${c.name}">${c.name}</option>`).join(''); window.updateSubSelect(); };
        window.updateSubSelect = () => { const val = document.getElementById('in-cat').value; const sub = document.getElementById('in-sub'); const cat = categoryTree.find(c => c.name === val); sub.innerHTML = '<option value="">-- Yok --</option>' + (cat ? (cat.sub||[]).map(s => `<option value="${s.name}">${s.name}</option>`).join('') : ''); window.updateSubSubSelect(); };
        window.updateSubSubSelect = () => { const mVal = document.getElementById('in-cat').value; const sVal = document.getElementById('in-sub').value; const ss = document.getElementById('in-sub-sub'); const mCat = categoryTree.find(c => c.name === mVal); const sCat = mCat ? (mCat.sub||[]).find(s => s.name === sVal) : null; ss.innerHTML = '<option value="">-- Yok --</option>' + (sCat ? (sCat.sub||[]).map(x => `<option value="${x.name}">${x.name}</option>`).join('') : ''); };

        // --- KATEGORİ YÖNETİMİ ---
        window.openCatManager = () => { renderCatMan(); document.getElementById('catModal').classList.add('show'); document.getElementById('globalOverlay').classList.add('show'); };
        const renderCatMan = () => {
            document.getElementById('catManList').innerHTML = categoryTree.map(c => `
                <div style="background:var(--bg-color); border:1px solid var(--border-color); border-radius:12px; padding:15px; margin-bottom:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;"><b style="font-size:14px; color:white; display:flex; align-items:center; gap:8px;">${c.iconUrl ? `<img src="${c.iconUrl}" style="width:20px;height:20px;object-fit:contain;">` : ''} ${c.name}</b><div><button class="action-icon-btn" onclick="window.openEditCatModal('${c.id}', null, null)" title="Düzenle"><i class="fa-solid fa-pen"></i></button><button class="action-icon-btn" onclick="window.openEditCatModal('${c.id}', 'NEW_SUB', null)"><i class="fa-solid fa-plus"></i> Alt Ekle</button><button class="action-icon-btn" style="color:var(--danger-color);" onclick="window.delCat('${c.id}', null, null)"><i class="fa-solid fa-trash"></i></button></div></div>
                    ${(c.sub||[]).map(s => `
                        <div style="margin-left:15px; border-left:2px solid var(--border-color); padding-left:10px; margin-bottom:5px;">
                            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--sidebar-bg); padding:6px 10px; border-radius:8px; margin-bottom:2px;"><span style="font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:8px;">↳ ${s.iconUrl ? `<img src="${s.iconUrl}" style="width:16px;height:16px;object-fit:contain;">` : ''} ${s.name}</span><div><button class="action-icon-btn" onclick="window.openEditCatModal('${c.id}', '${s.id}', null)" title="Düzenle"><i class="fa-solid fa-pen"></i></button><button class="action-icon-btn" onclick="window.openEditCatModal('${c.id}', '${s.id}', 'NEW_SUB_SUB')"><i class="fa-solid fa-plus"></i> Alt Ekle</button><button class="action-icon-btn" style="color:var(--danger-color);" onclick="window.delCat('${c.id}', '${s.id}', null)"><i class="fa-solid fa-xmark"></i></button></div></div>
                            ${(s.sub||[]).map(ss => `
                                <div style="margin-left:20px; display:flex; justify-content:space-between; align-items:center; background:#111; padding:4px 10px; border-radius:6px; margin-bottom:2px;"><span style="font-size:11px; color:#777; display:flex; align-items:center; gap:8px;">- ${ss.iconUrl ? `<img src="${ss.iconUrl}" style="width:12px;height:12px;object-fit:contain;">` : ''} ${ss.name}</span><div><button class="action-icon-btn" onclick="window.openEditCatModal('${c.id}', '${s.id}', '${ss.id}')" title="Düzenle"><i class="fa-solid fa-pen"></i></button><button class="action-icon-btn" style="color:var(--danger-color);" onclick="window.delCat('${c.id}', '${s.id}', '${ss.id}')"><i class="fa-solid fa-xmark"></i></button></div></div>
                            `).join('')}
                        </div>`).join('')}
                </div>`).join('');
        };
        
        window.openEditCatModal = (mId, sId, ssId) => {
            document.getElementById('ec-mId').value = mId || ''; document.getElementById('ec-sId').value = sId || ''; document.getElementById('ec-ssId').value = ssId || '';
            document.getElementById('ec-name').value = ''; document.getElementById('ec-icon').value = '';
            
            let title = "Yeni Kategori Ekle";
            if(mId && !sId && !ssId) { const c = categoryTree.find(x=>x.id===mId); title = "Ana Kategori Düzenle"; document.getElementById('ec-name').value = c.name; }
            else if(mId && sId && sId !== 'NEW_SUB' && !ssId) { const c = categoryTree.find(x=>x.id===mId).sub.find(x=>x.id===sId); title = "Alt Kategori Düzenle"; document.getElementById('ec-name').value = c.name; }
            else if(mId && sId && ssId && ssId !== 'NEW_SUB_SUB') { const c = categoryTree.find(x=>x.id===mId).sub.find(x=>x.id===sId).sub.find(x=>x.id===ssId); title = "3. Seviye Kategori Düzenle"; document.getElementById('ec-name').value = c.name; }
            else if(sId === 'NEW_SUB') title = "Alt Kategori Ekle";
            else if(ssId === 'NEW_SUB_SUB') title = "3. Seviye Alt Kategori Ekle";
            
            document.getElementById('editCatTitle').innerText = title; document.getElementById('editCatModal').classList.add('show');
        };

        window.closeEditCatModal = () => document.getElementById('editCatModal').classList.remove('show');

        window.saveEditCat = async () => {
            const mId = document.getElementById('ec-mId').value, sId = document.getElementById('ec-sId').value, ssId = document.getElementById('ec-ssId').value;
            const name = document.getElementById('ec-name').value.trim(); const file = document.getElementById('ec-icon').files[0];
            if(!name) return;
            const btn = document.getElementById('saveEditCatBtn'); btn.innerText = "Yükleniyor..."; btn.disabled = true;
            let iconUrl = ""; if(file) { try { iconUrl = await uploadImageToCloud(file); } catch(e){} }
            
            if(!mId) { categoryTree.push({id: Date.now().toString(), name, sub: [], iconUrl}); } 
            else if(mId && !sId) { const c = categoryTree.find(x=>x.id===mId); c.name = name; if(iconUrl) c.iconUrl = iconUrl; } 
            else if(mId && sId === 'NEW_SUB') { categoryTree.find(x=>x.id===mId).sub.push({id: Date.now().toString(), name, sub: [], iconUrl}); } 
            else if(mId && sId && !ssId) { const c = categoryTree.find(x=>x.id===mId).sub.find(x=>x.id===sId); c.name = name; if(iconUrl) c.iconUrl = iconUrl; } 
            else if(mId && sId && ssId === 'NEW_SUB_SUB') { categoryTree.find(x=>x.id===mId).sub.find(x=>x.id===sId).sub = categoryTree.find(x=>x.id===mId).sub.find(x=>x.id===sId).sub || []; categoryTree.find(x=>x.id===mId).sub.find(x=>x.id===sId).sub.push({id: Date.now().toString(), name, iconUrl}); } 
            else if(mId && sId && ssId) { const c = categoryTree.find(x=>x.id===mId).sub.find(x=>x.id===sId).sub.find(x=>x.id===ssId); c.name = name; if(iconUrl) c.iconUrl = iconUrl; } 
            
            await saveTree(); window.closeEditCatModal(); btn.innerText = "Kaydet"; btn.disabled = false;
        };

        window.delCat = async (mId, sId, ssId) => {
            if(confirm('Silinecek. Emin misin?')) {
                if(!sId) { categoryTree = categoryTree.filter(c => c.id !== mId); }
                else if(sId && !ssId) { const m = categoryTree.find(c => c.id === mId); m.sub = m.sub.filter(s => s.id !== sId); }
                else if(sId && ssId) { const s = categoryTree.find(c => c.id === mId).sub.find(x=>x.id===sId); s.sub = s.sub.filter(x => x.id !== ssId); }
                await saveTree();
            }
        };

        const saveTree = async () => { await setDoc(doc(db, "settings", "categories"), { tree: categoryTree }); renderSidebar(); renderCatMan(); updateInCatSelect(); };
        const saveTreeSilent = async () => { await setDoc(doc(db, "settings", "categories"), { tree: categoryTree }); updateInCatSelect(); renderCatMan(); };

        loadSystemData(); loadData();
    </script>
</body>
</html>
