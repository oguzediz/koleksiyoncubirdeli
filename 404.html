<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sayfa Bulunamadı - Koleksiyoncubirdeli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
      @font-face {
          font-family: 'OzelFont';
          src: url('./fonts/DJB%20Chalk%20It%20Up.ttf') format('truetype');
      }
      :root {
          --bg-color: #0f0f0f; --sidebar-bg: #161616; --text-main: #efefef; --text-muted: #a0a0a0;
          --border-color: #2a2a2a; --accent-color: #2ea043;
      }
      body {
        background: var(--bg-color);
        color: var(--text-main);
        font-family: 'OzelFont', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
      }
      .container { max-width: 500px; padding: 20px; }
      h1 { font-size: 72px; color: var(--accent-color); margin: 0; }
      h2 { font-size: 24px; margin: 10px 0 20px 0; }
      p { color: var(--text-muted); margin-bottom: 30px; }
      a { text-decoration: none; color: #000; background: var(--text-main); padding: 12px 25px; border-radius: 12px; font-weight: 800; transition: 0.2s; }
      a:hover { background: #fff; transform: translateY(-2px); }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>404</h1>
      <h2>Sayfa Bulunamadı</h2>
      <p>Aradığınız sayfa kaybolmuş ya da hiç var olmamış olabilir. Lütfen adresi kontrol edip tekrar deneyin.</p>
      <a href="/"><i class="fa-solid fa-folder-open"></i> Arşive Geri Dön</a>
    </div>
  </body>
</html>
